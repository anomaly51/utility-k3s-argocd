namespace:
  create: false
images: {}
rawManifests: |
  apiVersion: v1
  kind: Namespace
  metadata:
    name: elk
  ---
  apiVersion: v1
  kind: Secret
  metadata:
    name: elasticsearch-master-certs
    namespace: elk
  stringData:
    ca.crt: |
      disabled
  type: Opaque
  ---
  apiVersion: v1
  kind: Secret
  metadata:
    name: elk-basic-auth
    namespace: elk
  stringData:
    users: |
      elk:$apr1$Y1eeT0xF$Msj66F5kZhoyiKgJheYxm/
  type: Opaque
  ---
  apiVersion: v1
  kind: Secret
  metadata:
    name: kibana-kibana-es-token
    namespace: elk
  stringData:
    token: disabled
  type: Opaque
  ---
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      external-dns.alpha.kubernetes.io/hostname: elasticsearch.api-api-api.com
      external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
      external-dns.alpha.kubernetes.io/ttl: "120"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.middlewares: elk-elk-auth@kubernetescrd
      traefik.ingress.kubernetes.io/router.tls: "true"
    name: elasticsearch
    namespace: elk
  spec:
    ingressClassName: traefik
    rules:
    - host: elasticsearch.api-api-api.com
      http:
        paths:
        - backend:
            service:
              name: elasticsearch-master
              port:
                number: 9200
          path: /
          pathType: Prefix
    tls:
    - hosts:
      - elasticsearch.api-api-api.com
      secretName: elasticsearch-tls-secret
  ---
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      external-dns.alpha.kubernetes.io/hostname: kibana.api-api-api.com
      external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
      external-dns.alpha.kubernetes.io/ttl: "120"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.middlewares: elk-elk-auth@kubernetescrd
      traefik.ingress.kubernetes.io/router.tls: "true"
    name: kibana
    namespace: elk
  spec:
    ingressClassName: traefik
    rules:
    - host: kibana.api-api-api.com
      http:
        paths:
        - backend:
            service:
              name: kibana-kibana
              port:
                number: 5601
          path: /
          pathType: Prefix
    tls:
    - hosts:
      - kibana.api-api-api.com
      secretName: kibana-tls-secret
  ---
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      external-dns.alpha.kubernetes.io/hostname: logstash.api-api-api.com
      external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
      external-dns.alpha.kubernetes.io/ttl: "120"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.middlewares: elk-elk-auth@kubernetescrd
      traefik.ingress.kubernetes.io/router.tls: "true"
    name: logstash
    namespace: elk
  spec:
    ingressClassName: traefik
    rules:
    - host: logstash.api-api-api.com
      http:
        paths:
        - backend:
            service:
              name: logstash-logstash
              port:
                number: 8080
          path: /
          pathType: Prefix
    tls:
    - hosts:
      - logstash.api-api-api.com
      secretName: logstash-tls-secret
  ---
  apiVersion: traefik.io/v1alpha1
  kind: Middleware
  metadata:
    name: elk-auth
    namespace: elk
  spec:
    basicAuth:
      secret: elk-basic-auth
