            config --global url."https://x-access-token:${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/".insteadOf
            "https://github.com/"; git push origin main;'
          command:
          - sh
          - -c
          dependencies:
          - run-ansible
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          envFrom:
          - secretRef:
              name: terraform-state-minio
          image: __IMAGE_terraform__
          name: commit-tf
        volumeMounts:
        - mountPath: /workspace
          name: workspace
      inputs:
        parameters:
        - name: cluster-name
        - name: target-nodes
        - name: master-count
        - name: worker-count
        - name: cores
        - name: memory
        - name: disk-size
      name: provision-steps
      volumes:
      - emptyDir: {}
        name: workspace
