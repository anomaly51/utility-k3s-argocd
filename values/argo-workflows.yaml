      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      external-dns.alpha.kubernetes.io/hostname: argo-workflows.api-api-api.com
      external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
      external-dns.alpha.kubernetes.io/ttl: "120"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    name: argo-server
    namespace: argo-workflows
  spec:
    ingressClassName: traefik
    rules:
    - host: argo-workflows.api-api-api.com
      http:
        paths:
        - backend:
            service:
              name: argo-server
              port:
                number: 2746
          path: /
          pathType: Prefix
    tls:
    - hosts:
      - argo-workflows.api-api-api.com
      secretName: argo-workflows-tls-secret
  ---
  apiVersion: traefik.io/v1alpha1
  kind: IngressRoute
  metadata:
    name: argo-server-https
    namespace: argo-workflows
  spec:
    entryPoints:
    - websecure
    routes:
    - kind: Rule
      match: Host(`argo-workflows.api-api-api.com`)
      priority: 1000
      services:
      - name: argo-server
        port: 2746
        scheme: https
        serversTransport: argo-server
    tls:
      secretName: argo-workflows-tls-secret
  ---
  apiVersion: traefik.io/v1alpha1
  kind: ServersTransport
  metadata:
    name: argo-server
    namespace: argo-workflows
  spec:
    insecureSkipVerify: true
