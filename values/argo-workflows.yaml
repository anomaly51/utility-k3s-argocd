          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          envFrom:
          - secretRef:
              name: terraform-state-minio
          image: __IMAGE_terraform__
          name: apply-tf
        - args:
          - set -e; trap 'exit_code=$?; if [ $exit_code -ne 0 ]; then echo "⚠️ run-ansible
            failed! Destroying cluster..."; cd /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}}
            && terraform destroy -auto-approve || true; fi; exit $exit_code' EXIT; apk
            add --no-cache git ansible openssh-client py3-pip py3-requests jq; pip3
            install proxmoxer --break-system-packages || pip3 install proxmoxer; ansible-galaxy
            collection install community.proxmox; mkdir -p ~/.ssh; printf '-----BEGIN
            OPENSSH PRIVATE KEY-----\nb3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW\nQyNTUxOQAAACD5YK+hwQw+eyIBAEdg/nTJ4/Lv9iLdbqPTpKoH2lUIpwAAAJAa/POCGvzz\nggAAAAtzc2gtZWQyNTUxOQAAACD5YK+hwQw+eyIBAEdg/nTJ4/Lv9iLdbqPTpKoH2lUIpw\nAAAEDIuAdzJk3z34U/O5FvZ4zh2JdiBcj2elF6RNyI0uFG6flgr6HBDD57IgEAR2D+dMnj\n8u/2It1uo9OkqgfaVQinAAAACnByb3htb3gtdm0BAgM=\n-----END
            OPENSSH PRIVATE KEY-----\n' > ~/.ssh/id_ed25519_proxmox-vm; chmod 600 ~/.ssh/id_ed25519_proxmox-vm;
            git clone https://x-access-token:${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/anomaly51/ansible-infra.git
            /workspace/ansible-repo; chmod 755 /workspace/ansible-repo; cd /workspace/ansible-repo;
            sleep 45; ansible-playbook -i inventory/proxmox.yml playbooks/setup-k3s-cluster.yaml
            -e "target_master=~.*{{inputs.parameters.cluster-name}}-master.*" -e "target_workers=~.*{{inputs.parameters.cluster-name}}-worker.*";
            cd /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}}; MASTER_IP=$(terraform
            output -json master_ips | jq -r '.[0]'); mkdir -p /workspace/kube; ssh -i
