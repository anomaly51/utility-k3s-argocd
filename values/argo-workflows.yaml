        property: secret_access_key
      secretKey: AWS_SECRET_ACCESS_KEY
    refreshInterval: 1h
    secretStoreRef:
      kind: ClusterSecretStore
      name: vault-backend
    target:
      creationPolicy: Owner
      name: terraform-state-minio
      template:
        data:
          AWS_ENDPOINT_URL_S3: http://minio.minio-system.svc.cluster.local:9000
          TF_STATE_BUCKET: terraform-state
          TF_STATE_REGION: us-east-1
        mergePolicy: Merge
