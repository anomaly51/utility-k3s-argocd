          - run-ansible
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          envFrom:
          - secretRef:
              name: terraform-state-minio
          image: __IMAGE_terraform__
          name: setup-argocd
        - args:
          - 'set -e; trap ''exit_code=$?; if [ $exit_code -ne 0 ]; then echo "⚠️ commit-tf
            failed! Destroying cluster..."; cd /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}}
            && terraform destroy -auto-approve || true; fi; exit $exit_code'' EXIT;
            apk add --no-cache git; cd /workspace/tf-repo; git config --global user.name
            "Argo Workflows"; git config --global user.email "argo@devops.local"; git
            add envs/shared/{{inputs.parameters.cluster-name}}/; git commit -m "feat:
            terraform apply and Argo CD init for cluster {{inputs.parameters.cluster-name}}";
            git config --global url."https://x-access-token:${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/".insteadOf
            "https://github.com/"; git push origin main;'
          command:
          - sh
          - -c
          dependencies:
          - setup-argocd
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          envFrom:
          - secretRef:
              name: terraform-state-minio
          image: __IMAGE_terraform__
          name: commit-tf
        volumeMounts:
        - mountPath: /workspace
          name: workspace
      inputs:
        parameters:
        - name: cluster-name
        - name: target-nodes
        - name: master-count
        - name: worker-count
        - name: cores
        - name: memory
        - name: disk-size
      name: provision-steps
      volumes:
      - emptyDir: {}
        name: workspace
  ---
  apiVersion: argoproj.io/v1alpha1
  kind: WorkflowTemplate
  metadata:
    name: terraform-apply-proxmox-vm
    namespace: argo-workflows
  spec:
    arguments:
      parameters:
      - name: vm-name
        value: new-vm
      - name: target-node
        value: machine-1
      - name: cores
        value: "4"
      - name: memory
        value: "4096"
      - name: disk-size
        value: "20"
    entrypoint: provision-steps
    serviceAccountName: default
    templates:
    - containerSet:
        containers:
        - args:
          - |
            set -e
            git clone https://x-access-token:${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/anomaly51/proxmox-vms-terraform.git /workspace/repo
          command:
          - sh
          - -c
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          image: __IMAGE_git__
          name: clone
        - args:
          - |
            set -e
            mkdir -p /workspace/repo/envs/shared/{{inputs.parameters.vm-name}}
            cat << 'EOF' > /workspace/repo/envs/shared/{{inputs.parameters.vm-name}}/main.tf
            terraform {
              required_providers {
                proxmox = {
                  source  = "telmate/proxmox"
                  version = "3.0.2-rc07"
                }
              }
            }
            provider "proxmox" {
              pm_api_url          = "https://192.168.1.35:8006/api2/json"
              pm_api_token_id     = "terraform@pam!terraform"
              pm_api_token_secret = "bdcbd933-8cbf-4c6c-be85-41b0b8f74ba3"
              pm_tls_insecure     = true
            }
            module "vm" {
              source          = "../../../modules/vm"
              name            = "{{inputs.parameters.vm-name}}"
              description     = "Provisioned via Argo Workflows (Terraform Apply)"
              template_name   = "debian-base"
              target_node     = "{{inputs.parameters.target-node}}"
              cores           = {{inputs.parameters.cores}}
              memory          = {{inputs.parameters.memory}}
              scsi0_disk_size = {{inputs.parameters.disk-size}}
            }
            EOF
            cat << 'EOF' > /workspace/repo/envs/shared/{{inputs.parameters.vm-name}}/backend.tf
            terraform {
              backend "s3" {}
            }
            EOF
          command:
          - sh
          - -c
          dependencies:
          - clone
          image: alpine:3.18
          name: generate
        - args:
          - |
            set -e
            git config --global url."https://x-access-token:${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/".insteadOf "https://github.com/"
            cd /workspace/repo/envs/shared/{{inputs.parameters.vm-name}}
            bash ../../../scripts/terraform-init-minio.sh
            terraform apply -auto-approve
          command:
          - sh
          - -c
          dependencies:
          - generate
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          envFrom:
          - secretRef:
              name: terraform-state-minio
          image: __IMAGE_terraform__
          name: apply
        - args:
          - |
            set -e
            cd /workspace/repo
            git config --global user.name "Argo Workflows"
            git config --global user.email "argo@devops.local"
            git add envs/shared/{{inputs.parameters.vm-name}}/
            git commit -m "feat: terraform apply VM {{inputs.parameters.vm-name}}"
            git push origin main
          command:
          - sh
          - -c
          dependencies:
          - apply
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          image: __IMAGE_git__
          name: commit
        volumeMounts:
        - mountPath: /workspace
          name: workspace
      inputs:
        parameters:
        - name: vm-name
        - name: target-node
        - name: cores
        - name: memory
        - name: disk-size
      name: provision-steps
      volumes:
      - emptyDir: {}
        name: workspace
  ---
  apiVersion: argoproj.io/v1alpha1
  kind: WorkflowTemplate
  metadata:
    name: terraform-destroy-k3s-cluster
    namespace: argo-workflows
  spec:
    arguments:
      parameters:
      - name: cluster-name
        value: new-k3s
    entrypoint: destroy-steps
    serviceAccountName: default
    templates:
    - containerSet:
        containers:
        - args:
          - |
            set -e
            git clone https://x-access-token:${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/anomaly51/proxmox-vms-terraform.git /workspace/repo
          command:
          - sh
          - -c
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          image: __IMAGE_git__
          name: clone-tf
        - args:
          - |
            set -e
            git config --global url."https://x-access-token:${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/".insteadOf "https://github.com/"
            cd /workspace/repo/envs/shared/{{inputs.parameters.cluster-name}}
            bash ../../../scripts/terraform-init-minio.sh
            terraform destroy -auto-approve
          command:
          - sh
          - -c
          dependencies:
          - clone-tf
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          envFrom:
          - secretRef:
              name: terraform-state-minio
          image: __IMAGE_terraform__
          name: destroy-tf
        - args:
          - |
            set -e
            apk add --no-cache curl
            curl -L -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GIT_TOKEN_P1}${GIT_TOKEN_P2}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/anomaly51/{{inputs.parameters.cluster-name}}-argocd || true
          command:
          - sh
          - -c
          dependencies:
          - destroy-tf
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          image: alpine:3.18
          name: delete-gitops-repo
        - args:
          - |
            set -e
            cd /workspace/repo
            git config --global user.name "Argo Workflows"
            git config --global user.email "argo@devops.local"
            git rm -rf envs/shared/{{inputs.parameters.cluster-name}}/
            git commit -m "feat: terraform destroy K3s cluster {{inputs.parameters.cluster-name}}"
            git push origin main
          command:
          - sh
          - -c
          dependencies:
          - delete-gitops-repo
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          image: __IMAGE_git__
          name: commit-tf
        volumeMounts:
        - mountPath: /workspace
          name: workspace
      inputs:
        parameters:
        - name: cluster-name
      name: destroy-steps
      volumes:
      - emptyDir: {}
        name: workspace
  ---
