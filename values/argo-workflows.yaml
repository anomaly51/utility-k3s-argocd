            "sudo cat /etc/rancher/k3s/k3s.yaml" > /workspace/kube/config; sed -i "s/127.0.0.1/$MASTER_IP/g"
            /workspace/kube/config;
          command:
          - sh
          - -c
          dependencies:
          - apply-tf
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          - name: ANSIBLE_HOST_KEY_CHECKING
            value: "False"
          envFrom:
          - secretRef:
              name: terraform-state-minio
          image: __IMAGE_terraform__
          name: run-ansible
        - args:
          - 'set -e; trap ''exit_code=$?; if [ $exit_code -ne 0 ]; then echo "⚠️ commit-tf
            failed! Destroying cluster..."; cd /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}}
            && terraform destroy -auto-approve || true; fi; exit $exit_code'' EXIT;
            apk add --no-cache git; cd /workspace/tf-repo; git config --global user.name
