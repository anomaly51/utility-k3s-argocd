        value: "1"
      - name: worker-count
        value: "2"
      - name: cores
        value: "4"
      - name: memory
        value: "4096"
      - name: disk-size
        value: "20"
    entrypoint: provision-steps
    serviceAccountName: default
    templates:
    - containerSet:
        containers:
        - args:
          - set -e; git clone https://x-access-token:${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/anomaly51/proxmox-vms-terraform.git
            /workspace/tf-repo;
          command:
          - sh
          - -c
          env:
          - name: GIT_TOKEN_P1
            valueFrom:
              secretKeyRef:
                key: token
                name: github-token
          - name: GIT_TOKEN_P2
            value: ""
          image: __IMAGE_git__
          name: clone-tf
        - args:
          - set -e; mkdir -p /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}};
            printf 'terraform {\n  required_providers {\n    proxmox = {\n      source  =
            "telmate/proxmox"\n      version = "3.0.2-rc07"\n    }\n  }\n}\n\nprovider
            "proxmox" {\n  pm_api_url          = "https://192.168.1.35:8006/api2/json"\n  pm_api_token_id     =
            "terraform@pam!terraform"\n  pm_api_token_secret = "bdcbd933-8cbf-4c6c-be85-41b0b8f74ba3"\n  pm_tls_insecure     =
            true\n  pm_parallel         = 4\n}\n\nmodule "k3s_cluster" {\n  source        =
            "../../../modules/k3s-cluster"\n  cluster_name  = "%s"\n  proxmox_nodes
            = %s\n  template_name = "debian-k3s"\n  master_count  = %s\n  worker_count  =
            %s\n  cores         = %s\n  memory        = %s\n  disk_size     = %s\n}\n\noutput
            "master_ips" {\n  value = module.k3s_cluster.master_ips\n}\n' "{{inputs.parameters.cluster-name}}"
            '{{inputs.parameters.target-nodes}}' "{{inputs.parameters.master-count}}"
            "{{inputs.parameters.worker-count}}" "{{inputs.parameters.cores}}" "{{inputs.parameters.memory}}"
            "{{inputs.parameters.disk-size}}" > /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}}/main.tf;
            printf 'terraform {\n  backend "s3" {}\n}\n' > /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}}/backend.tf;
          command:
          - sh
          - -c
          dependencies:
          - clone-tf
          image: alpine:3.18
          name: generate-tf
        - args:
          - set -e; trap 'exit_code=$?; if [ $exit_code -ne 0 ]; then echo "⚠️ apply-tf
            failed! Rolling back..."; cd /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}}
            && terraform destroy -auto-approve || true; fi; exit $exit_code' EXIT; git
            config --global url."https://x-access-token:${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/".insteadOf
            "https://github.com/"; cd /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}};
            bash ../../../scripts/terraform-init-minio.sh; terraform apply -auto-approve;
          command:
          - sh
          - -c
          dependencies:
          - generate-tf
