namespace:
  create: false
images:
  prometheus_pve_exporter:
    repository: prompve/prometheus-pve-exporter
    tag: 3.9.0
rawManifests: |
  apiVersion: v1
  kind: Namespace
  metadata:
    name: proxmox-exporter
  ---
  apiVersion: v1
  kind: Service
  metadata:
    labels:
      app.kubernetes.io/name: prometheus-pve-exporter
    name: prometheus-pve-exporter
    namespace: proxmox-exporter
  spec:
    ports:
    - name: http
      port: 9221
      targetPort: http
    selector:
      app.kubernetes.io/name: prometheus-pve-exporter
  ---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app.kubernetes.io/name: prometheus-pve-exporter
    name: prometheus-pve-exporter
    namespace: proxmox-exporter
  spec:
    replicas: 1
    selector:
      matchLabels:
        app.kubernetes.io/name: prometheus-pve-exporter
    template:
      metadata:
        labels:
          app.kubernetes.io/name: prometheus-pve-exporter
      spec:
        containers:
        - args:
          - --web.listen-address=0.0.0.0:9221
          envFrom:
          - secretRef:
              name: proxmox-exporter
          image: __IMAGE_prometheus_pve_exporter__
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          name: prometheus-pve-exporter
          ports:
          - containerPort: 9221
            name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 64Mi
  ---
  apiVersion: external-secrets.io/v1
  kind: ExternalSecret
  metadata:
    name: proxmox-exporter
    namespace: proxmox-exporter
  spec:
    data:
    - remoteRef:
        key: shared/proxmox-exporter
        property: user
      secretKey: PVE_USER
    - remoteRef:
        key: shared/proxmox-exporter
        property: token-name
      secretKey: PVE_TOKEN_NAME
    - remoteRef:
        key: shared/proxmox-exporter
        property: token-value
      secretKey: PVE_TOKEN_VALUE
    - remoteRef:
        key: shared/proxmox-exporter
        property: verify-ssl
      secretKey: PVE_VERIFY_SSL
    refreshInterval: 5m
    secretStoreRef:
      kind: ClusterSecretStore
      name: vault-backend
    target:
      creationPolicy: Owner
      name: proxmox-exporter
