name: Publish common-app chart

on:
  push:
    branches:
      - main
    paths:
      - charts/common-app/**
      - .github/workflows/publish-common-app-chart.yaml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HARBOR_REGISTRY: harbor.api-api-api.com
      HARBOR_PROJECT: helm-charts
      CHART_DIR: charts/common-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint "$CHART_DIR"

      - name: Package chart
        run: helm package "$CHART_DIR"

      - name: Login to Harbor
        run: helm registry login "$HARBOR_REGISTRY" --username "$HARBOR_USERNAME" --password-stdin <<< "$HARBOR_PASSWORD"
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      - name: Push chart to Harbor OCI
        run: |
          chart_package="$(ls common-app-*.tgz | head -n 1)"
          helm push "$chart_package" "oci://$HARBOR_REGISTRY/$HARBOR_PROJECT"
