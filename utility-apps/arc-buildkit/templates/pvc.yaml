apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "arc-buildkit.name" . }}-cache
  namespace: {{ include "arc-buildkit.namespace" . }}
  labels:
    {{- include "arc-buildkit.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  storageClassName: {{ .Values.persistence.storageClassName }}
