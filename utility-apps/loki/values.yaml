loki:
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      path_prefix: "/var/loki"
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
      - from: '2024-04-01'
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
    limits_config:
      retention_period: 14d
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      volume_enabled: true
    compactor:
      retention_enabled: false
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      whenScaled: Retain
      whenDeleted: Retain
      enableStatefulSetAutoDeletePVC: true
      storageClass: nfs-client
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false
  gateway:
    enabled: true
    basicAuth:
      enabled: true
      username: alloy
      password: architect-business-bot-loki
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        external-dns.alpha.kubernetes.io/hostname: loki.api-api-api.com
        external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: 'true'
      hosts:
      - host: loki.api-api-api.com
        paths:
        - path: "/"
          pathType: Prefix
      tls:
      - secretName: loki-tls-secret
        hosts:
        - loki.api-api-api.com
  memberlist:
    service:
      publishNotReadyAddresses: true
