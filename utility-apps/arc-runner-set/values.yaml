gha-runner-scale-set:
  githubConfigUrl: https://github.com/anomaly51
  githubConfigSecret: arc-github-token
  maxRunners: 8
  minRunners: 2
  scaleSetLabels:
  - arc-runner-set
  controllerServiceAccount:
    namespace: arc-systems
    name: arc-controller-gha-rs-controller
  listenerTemplate:
    spec:
      containers:
      - name: listener
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
  template:
    spec:
      hostAliases:
      - ip: "10.43.122.186"
        hostnames:
        - harbor.api-api-api.com
      nodeSelector:
        kubernetes.io/hostname: utility-k3s-worker-2
      containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command:
        - "/home/runner/run.sh"
        envFrom:
        - secretRef:
            name: architect-business-bot-ci-telegram
  containerMode:
    type: dind
