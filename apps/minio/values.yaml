---
common-app:
  namespace:
    create: false
  images:
    minio:
      repository: quay.io/minio/minio
      tag: RELEASE.2025-09-07T16-13-09Z
  objects:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: minio-system
  - apiVersion: v1
    kind: Service
    metadata:
      name: minio
      namespace: minio-system
    spec:
      ports:
      - name: api
        port: 9000
        targetPort: api
      - name: console
        port: 9001
        targetPort: console
      selector:
        app.kubernetes.io/name: minio
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: minio
      namespace: minio-system
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: minio
      serviceName: minio
      template:
        metadata:
          labels:
            app.kubernetes.io/name: minio
        spec:
          containers:
          - args:
            - server
            - "/data"
            - "--console-address"
            - :9001
            env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  key: root_user
                  name: minio-root
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: root_password
                  name: minio-root
            image: __IMAGE_minio__
            imagePullPolicy: IfNotPresent
            livenessProbe:
              httpGet:
                path: "/minio/health/live"
                port: api
              initialDelaySeconds: 30
              periodSeconds: 20
            name: minio
            ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
            readinessProbe:
              httpGet:
                path: "/minio/health/ready"
                port: api
              initialDelaySeconds: 10
              periodSeconds: 10
            resources:
              limits:
                cpu: '1'
                memory: 1Gi
              requests:
                cpu: 100m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
            volumeMounts:
            - mountPath: "/data"
              name: data
          securityContext:
            fsGroup: 1000
      volumeClaimTemplates:
      - metadata:
          annotations:
            argocd.argoproj.io/sync-options: Delete=false,Prune=false
            helm.sh/resource-policy: keep
          name: data
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          storageClassName: nfs-client
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: minio-root
      namespace: minio-system
    spec:
      data:
      - remoteRef:
          key: shared/minio
          property: root_user
        secretKey: root_user
      - remoteRef:
          key: shared/minio
          property: root_password
        secretKey: root_password
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        creationPolicy: Owner
        name: minio-root
