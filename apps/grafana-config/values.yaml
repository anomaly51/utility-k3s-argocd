      templates.yaml: |
        apiVersion: 1
        templates:
          - orgId: 1
            name: telegram-platform-template
            template: |
              {{ define "telegram.platform.message" -}}
              {{- if gt (len .Alerts.Firing) 0 -}}
              🚨🔥 ПРОБЛЕМА: {{ len .Alerts.Firing }} alert(s)
              {{ range .Alerts.Firing }}

              {{ template "telegram.platform.alert" . }}
              {{ end -}}
              {{ end -}}
              {{- if gt (len .Alerts.Resolved) 0 -}}
              ✅🟢 ВОССТАНОВЛЕНО: {{ len .Alerts.Resolved }} alert(s)
              {{ range .Alerts.Resolved }}

              {{ template "telegram.platform.alert" . }}
              {{ end -}}
              {{ end -}}
              {{- end }}

              {{ define "telegram.platform.alert" -}}
              {{- $severity := index .Labels "severity" -}}
              {{- $statusIcon := "ℹ️" -}}
              {{- if eq .Status "firing" -}}
              {{- if eq $severity "critical" -}}{{ $statusIcon = "🚨" -}}{{- else if eq $severity "warning" -}}{{ $statusIcon = "⚠️" -}}{{- else -}}{{ $statusIcon = "ℹ️" -}}{{- end -}}
              {{- else if eq .Status "resolved" -}}
              {{- $statusIcon = "✅" -}}
              {{- end -}}
              {{ $statusIcon }} {{ if eq .Status "resolved" }}OK{{ else }}DOWN{{ end }} {{ index .Labels "alertname" }}
              ━━━━━━━━━━━━━━━━━━━━
              {{- with index .Labels "grafana_folder" }}
              📁 Folder: {{ . }}{{ end }}
              {{- with index .Labels "cluster" }}
              🧩 Cluster: {{ . }}{{ end }}
              {{- with index .Labels "namespace" }}
              📦 Namespace: {{ . }}{{ end }}
              {{- with index .Labels "pod" }}
              🧱 Pod: {{ . }}{{ end }}
              {{- with index .Labels "container" }}
              📦 Container: {{ . }}{{ end }}
              {{- with index .Labels "instance" }}
              🖥️ Instance: {{ . }}{{ end }}
              {{- with index .Labels "id" }}
              🆔 ID: {{ . }}{{ end }}
              {{- with index .Labels "job" }}
              ⚙️ Job: {{ . }}{{ end }}
              {{- with index .Labels "scope" }}
              🔎 Scope: {{ . }}{{ end }}
              {{- with $severity }}
              🏷️ Severity: {{ . }}{{ end }}
              {{- if eq .Status "resolved" }}

              ✅ Status: alert cleared
              {{- else }}
              {{- with .Annotations.summary }}

              📝 {{ . }}{{ end }}
              {{- end }}
              {{- with .ValueString }}

              📊 Value: {{ . }}{{ end }}
              {{- with .GeneratorURL }}

              📈 Dashboard: {{ . }}{{ end }}
              {{- with .SilenceURL }}
              🔕 Silence: {{ . }}{{ end }}
              {{- end }}
