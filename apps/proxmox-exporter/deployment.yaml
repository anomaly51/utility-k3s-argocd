apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-pve-exporter
  namespace: proxmox-exporter
  labels:
    app.kubernetes.io/name: prometheus-pve-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-pve-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus-pve-exporter
    spec:
      containers:
        - name: prometheus-pve-exporter
          image: prompve/prometheus-pve-exporter:3.9.0
          imagePullPolicy: IfNotPresent
          args:
            - --web.listen-address=0.0.0.0:9221
          envFrom:
            - secretRef:
                name: proxmox-exporter
          ports:
            - name: http
              containerPort: 9221
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
