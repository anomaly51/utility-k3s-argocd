apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - external-secret.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-proxmox-cluster-operations-dashboard
    namespace: grafana
    files:
      - dashboards/proxmox-cluster-operations.json
  - name: grafana-kubernetes-fixed-dashboards
    namespace: grafana
    files:
      - dashboards/k8s-system-api-server-fixed.json
      - dashboards/k8s-system-coredns-fixed.json
      - dashboards/k8s-views-pods-fixed.json
      - dashboards/k8s-addons-prometheus-fixed.json
  - name: grafana-application-dashboards
    namespace: grafana
    files:
      - dashboards/architect-business-bot.json
  - name: grafana-alerting-provisioning
    namespace: grafana
    files:
      - alerting/contactpoints.yaml
      - alerting/templates.yaml
      - alerting/policies.yaml
      - alerting/kubernetes-alerts.yaml
      - alerting/proxmox-alerts.yaml
      - alerting/deletions.yaml
    options:
      labels:
        grafana_alert: "1"
