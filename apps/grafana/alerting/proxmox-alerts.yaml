              refId: C
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: OK
        execErrState: Error
        for: 1h
        labels: {severity: warning, team: platform, scope: proxmox}
        annotations:
          summary: Proxmox exporter reports guests without backups.
          runbook_url: https://grafana.api-api-api.com
