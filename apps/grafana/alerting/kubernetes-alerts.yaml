apiVersion: 1
groups:
  - orgId: 1
    name: cluster-ingestion
    folder: Kubernetes Alerts
    interval: 1m
    rules:
      - uid: k8s-utility-metrics-missing
        title: Utility cluster metrics missing
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: prometheus
            model:
              datasource: {type: prometheus, uid: prometheus}
              editorMode: code
              expr: absent(up{cluster="utility-k3s"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              reducer: last
              type: reduce
              refId: B
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: B
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [C]}
                  reducer: {type: last}
                  type: query
              refId: C
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: OK
        execErrState: Error
        for: 5m
        labels: {severity: critical, team: platform, scope: monitoring}
        annotations:
          summary: Utility cluster stopped sending metrics to central Prometheus.
          runbook_url: https://grafana.api-api-api.com

