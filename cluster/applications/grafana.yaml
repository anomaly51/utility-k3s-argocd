                  chatid: "-5153526231"
                  bottoken: "$GF_ALERTING_TELEGRAM_BOT_TOKEN"
                  message: |
                    {{`{{ template "telegram.platform.message" . }}`}}
          templates.yaml:
            apiVersion: 1
            templates:
            - orgId: 1
              name: telegram-platform-template
              template: |
                {{`{{ define "telegram.platform.message" -}}`}}
                {{`{{- range .Alerts.Firing }}`}}
                {{`{{ template "telegram.platform.alert" . }}`}}
                {{`{{ end }}`}}
                {{`{{- range .Alerts.Resolved }}`}}
                {{`{{ template "telegram.platform.alert" . }}`}}
                {{`{{ end }}`}}
                {{`{{- end }}`}}

                {{`{{ define "telegram.platform.alert" }}`}}
                {{`{{- $alertname := index .Labels "alertname" -}}`}}
                {{`{{- $host := or (index .Labels "public_host") (index .Labels "instance") -}}`}}
                {{`{{ if eq .Status "firing" }}● down{{ else }}○ ok{{ end }} {{ with $host }}{{ . }}{{ else }}{{ $alertname }}{{ end }}`}}
                {{`{{ with .Annotations.summary }}`}}
                {{`{{ . }}`}}{{`{{ end }}`}}
                {{`{{ with .DashboardURL }}`}}
                dashboard {{`{{ . }}`}}{{`{{ else }}`}}{{`{{ with .Annotations.runbook_url }}`}}
                dashboard {{`{{ . }}`}}{{`{{ end }}`}}{{`{{ end }}`}}
                {{`{{ with .SilenceURL }}`}}
                silence {{`{{ . }}`}}{{`{{ end }}`}}
                {{`{{- end }}`}}
          policies.yaml:
            apiVersion: 1
            policies:
            - orgId: 1
              receiver: telegram-platform-alerts
              group_by:
              - grafana_folder
              - alertname
              - cluster
              - public_host
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              routes:
              - receiver: telegram-platform-alerts
                object_matchers:
                - - severity
                  - "="
                  - critical
                group_wait: 10s
                group_interval: 2m
                repeat_interval: 1h
              - receiver: telegram-platform-alerts
                object_matchers:
                - - severity
                  - "="
                  - warning
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 4h
          public-health-alerts.yaml:
            apiVersion: 1
            groups:
            - orgId: 1
              name: public-health
              folder: Application Alerts
              interval: 60s
              rules:
              - uid: public-health-endpoint-down
                title: Public health endpoint down
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: probe_success{job="public-health-checks"} == bool 0
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  datasourceUid: __expr__
                  model:
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    reducer: last
                    type: reduce
                    refId: B
                    intervalMs: 1000
                    maxDataPoints: 43200
                - refId: C
                  datasourceUid: __expr__
                  model:
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: B
                    type: threshold
                    conditions:
                    - evaluator:
                        type: gt
                        params:
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                      type: query
                    refId: C
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: Alerting
                execErrState: Error
                for: 5m
                labels:
                  severity: critical
                  team: platform
                  scope: public-health
                annotations:
                  summary: Public /health check failed.
                  runbook_url: https://grafana.api-api-api.com/d/public-health-checks
              - uid: public-health-endpoint-slow
                title: Public health endpoint slow
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: probe_duration_seconds{job="public-health-checks"} > 5
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  datasourceUid: __expr__
                  model:
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    reducer: last
                    type: reduce
                    refId: B
                    intervalMs: 1000
                    maxDataPoints: 43200
                - refId: C
                  datasourceUid: __expr__
                  model:
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: B
                    type: threshold
                    conditions:
                    - evaluator:
                        type: gt
                        params:
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                      type: query
                    refId: C
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: OK
                execErrState: Error
                for: 2m
                labels:
                  severity: warning
                  team: platform
                  scope: public-health
                annotations:
                  summary: Public /health check is slower than 5 seconds.
                  runbook_url: https://grafana.api-api-api.com/d/public-health-checks
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
  ignoreDifferences:
  - kind: PersistentVolumeClaim
    jsonPointers:
    - "/spec/volumeName"
    - "/spec/storageClassName"
