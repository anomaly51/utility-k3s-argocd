---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: '55'
spec:
  project: gitops-apps
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.15
    helm:
      releaseName: grafana
      values: |
        ---
        adminPassword: admin
        envValueFrom:
          GF_ALERTING_TELEGRAM_BOT_TOKEN:
            secretKeyRef:
              name: grafana-telegram
              key: botToken
              optional: false
        grafana.ini:
          server:
            domain: grafana.api-api-api.com
            root_url: https://grafana.api-api-api.com
          database:
            wal: false
            cache_mode: private
            query_retries: 10
            transaction_retries: 10
          unified_alerting:
            enabled: true
        sidecar:
          alerts:
            enabled: false
            label: grafana_alert
            labelValue: '1'
            searchNamespace: grafana
            resource: configmap
            initAlerts: false
            skipReload: false
        ingress:
          enabled: true
          ingressClassName: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-production
            external-dns.alpha.kubernetes.io/hostname: grafana.api-api-api.com
            external-dns.alpha.kubernetes.io/target: 1a6b03c9-00fc-48fa-af6f-b646c70ce361.cfargotunnel.com
            external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: 'true'
          hosts:
          - grafana.api-api-api.com
          tls:
          - secretName: grafana-tls-secret
            hosts:
            - grafana.api-api-api.com
        persistence:
          enabled: true
          storageClassName: nfs-client
          size: 10Gi
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
            - name: Prometheus
              type: prometheus
              uid: prometheus
              url: http://prometheus-server.prometheus.svc.cluster.local
              access: proxy
              isDefault: true
            - name: Loki
              type: loki
              uid: loki
              url: http://loki-gateway.loki.svc.cluster.local
              access: proxy
              basicAuth: true
              basicAuthUser: alloy
              secureJsonData:
                basicAuthPassword: architect-business-bot-loki
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
            - name: default
              orgId: 1
              folder: Infrastructure
              type: file
              disableDeletion: false
              editable: true
              options:
                path: "/var/lib/grafana/dashboards/default"
            - name: proxmox
              orgId: 1
              folder: Proxmox
              type: file
              disableDeletion: false
              editable: true
              options:
                path: "/var/lib/grafana/dashboards/proxmox"
            - name: kubernetes
              orgId: 1
              folder: Kubernetes
              type: file
              disableDeletion: false
              editable: true
              options:
                path: "/var/lib/grafana/dashboards/kubernetes"
            - name: kubernetes-fixed
              orgId: 1
              folder: Kubernetes
              type: file
              disableDeletion: false
              editable: true
              options:
                path: "/var/lib/grafana/dashboards/kubernetes-fixed"
            - name: applications
              orgId: 1
              folder: Applications
              type: file
              disableDeletion: false
              editable: true
              options:
                path: "/var/lib/grafana/dashboards/applications"
            - name: public-health
              orgId: 1
              folder: Applications
              type: file
              disableDeletion: false
              editable: true
              options:
                path: "/var/lib/grafana/dashboards/public-health"
        dashboardsConfigMaps:
          proxmox: grafana-proxmox-cluster-operations-dashboard
          kubernetes-fixed: grafana-kubernetes-fixed-dashboards
          applications: grafana-application-dashboards
        dashboards:
          kubernetes:
            k8s-views-global:
              gnetId: 15757
              revision: 43
              datasource: Prometheus
            k8s-views-namespaces:
              gnetId: 15758
              revision: 46
              datasource: Prometheus
            k8s-views-nodes:
              gnetId: 15759
              revision: 40
              datasource: Prometheus
