apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: '50'
spec:
  project: gitops-apps
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: "*"
    helm:
      releaseName: harbor
      values: |
        harborAdminPassword: admin
        externalURL: https://harbor.api-api-api.com
        expose:
          type: ingress
          tls:
            enabled: true
            certSource: secret
            secret:
              secretName: harbor-tls-secret
          ingress:
            hosts:
              core: harbor.api-api-api.com
            className: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-production
              external-dns.alpha.kubernetes.io/hostname: harbor.api-api-api.com
              external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
              external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
              external-dns.alpha.kubernetes.io/ttl: '120'
        persistence:
          enabled: true
          persistentVolumeClaim:
            registry:
              size: 50Gi
              storageClass: nfs-client
            database:
              size: 2Gi
              storageClass: nfs-client
            redis:
              size: 1Gi
              storageClass: nfs-client
            trivy:
              size: 2Gi
              storageClass: nfs-client
        trivy:
          enabled: true
        registry:
          relativeurls: true
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
