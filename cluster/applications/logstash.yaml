apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logstash
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: '57'
spec:
  project: gitops-apps
  source:
    repoURL: https://helm.elastic.co
    chart: logstash
    targetRevision: 8.5.1
    helm:
      releaseName: logstash
      values: |
        replicas: 1
        antiAffinity: soft
        logstashJavaOpts: "-Xms256m -Xmx256m"
        logstashConfig:
          logstash.yml: |
            http.host: 0.0.0.0
            xpack.monitoring.enabled: false
        logstashPipeline:
          logstash.conf: |
            input {
              http {
                port => 8080
              }
            }
            output {
              elasticsearch {
                hosts => ["http://elasticsearch-master:9200"]
                index => "logstash-%{+YYYY.MM.dd}"
              }
              stdout { codec => rubydebug }
            }
        service:
          ports:
          - name: http-input
            port: 8080
            protocol: TCP
            targetPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: elk
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
